```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Validação de Comprovante</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:95%;
  max-width:700px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  padding:30px;
}

.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo h1{
  margin:0;
  font-size:28px;
}

.rede{
  color:#d71920;
}

.vitoria{
  color:#071b44;
}

.logo p{
  margin:4px 0 0;
  letter-spacing:3px;
  font-size:11px;
  color:#071b44;
}

.status{
  text-align:center;
  margin-bottom:25px;
}

.status.ok{
  color:#0f8f2d;
}

.status.erro{
  color:#c62828;
}

.status h2{
  margin:0;
}

.bloco{
  margin-bottom:12px;
}

.label{
  font-weight:bold;
  color:#071b44;
}

.valor{
  color:#333;
}

.loading{
  text-align:center;
  color:#555;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
  <h1>
    <span class="rede">REDE</span>
    <span class="vitoria">VITÓRIA</span>
  </h1>
  <p>SUPERMERCADOS</p>
</div>

<div id="conteudo" class="loading">
  Validando documento...
</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbz4aLtDg_OEpJ2PD9fyVGlfmSsjFY8MBiZoCJIgE2i79Qe_XYUY-XBNjFhpSG4gtb8/exec";

const protocolo =
new URLSearchParams(window.location.search)
.get("protocolo");

if(!protocolo){

  document.getElementById("conteudo").innerHTML = `
    <div class="status erro">
      <h2>❌ Protocolo não informado</h2>
    </div>
  `;

}else{

  fetch(
    API +
    "?action=validarProtocolo" +
    "&protocolo=" +
    encodeURIComponent(protocolo)
  )
  .then(r => r.json())
  .then(dados => {

    if(!dados.valido){

      document.getElementById("conteudo").innerHTML = `
        <div class="status erro">
          <h2>❌ Documento não localizado</h2>
          <p>${dados.mensagem || ""}</p>
        </div>
      `;

      return;
    }

    const cpfMascarado =
      dados.cpf.replace(
        /(\d{3})(\d+)(\d{2})/,
        "$1.***.***-$3"
      );

    document.getElementById("conteudo").innerHTML = `
      <div class="status ok">
        <h2>✅ DOCUMENTO VÁLIDO</h2>
      </div>

      <div class="bloco">
        <span class="label">Nome:</span>
        <span class="valor">${dados.nome}</span>
      </div>

      <div class="bloco">
        <span class="label">CPF:</span>
        <span class="valor">${cpfMascarado}</span>
      </div>

      <div class="bloco">
        <span class="label">Competência:</span>
        <span class="valor">${dados.competencia}</span>
      </div>

      <div class="bloco">
        <span class="label">Data:</span>
        <span class="valor">${dados.data}</span>
      </div>

      <div class="bloco">
        <span class="label">Hora:</span>
        <span class="valor">${dados.hora}</span>
      </div>

      <div class="bloco">
        <span class="label">Status:</span>
        <span class="valor">${dados.status}</span>
      </div>

      <div class="bloco">
        <span class="label">Protocolo:</span>
        <span class="valor">${dados.protocolo}</span>
      </div>
    `;

  })
  .catch(() => {

    document.getElementById("conteudo").innerHTML = `
      <div class="status erro">
        <h2>❌ Erro ao validar documento</h2>
      </div>
    `;

  });

}

</script>

</body>
</html>
```
